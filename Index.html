<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strategy OS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

  <h1 class="text-3xl font-bold mb-6">✨ Strategy OS Dashboard</h1>

  <div class="grid grid-cols-1 gap-6">

    <!-- Content Idea -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold">📌 Content Idea</h2>
      <textarea class="w-full mt-2 p-2 border rounded" placeholder="Write your idea..."></textarea>
    </div>

    <!-- Hook -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold">🎯 Hook</h2>
      <input class="w-full mt-2 p-2 border rounded" placeholder="Write your hook..." />
    </div>

    <!-- Caption -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold">📝 Caption</h2>
      <textarea class="w-full mt-2 p-2 border rounded" placeholder="Write your caption..."></textarea>
    </div>

    <!-- CTA -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold">🚀 CTA</h2>
      <input class="w-full mt-2 p-2 border rounded" placeholder="Call to action..." />
    </div>

  </div>

</body>
</html>
